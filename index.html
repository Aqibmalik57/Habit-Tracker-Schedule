<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Schedule</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        padding-top: 100px;
      }
      a {
        display: inline-block;
        margin: 20px;
        padding: 10px 20px;
        background: #38bdf8;
        color: black;
        text-decoration: none;
        font-weight: bold;
        border-radius: 5px;
      }
      a:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <h1 id="secretTitle">Welcome to Weekly Schedule</h1>
    <p>Select a page to continue:</p>

    <a href="./HabbitTracker.html">Habits Tracker</a>
    <a href="./WeeklyRoutine.html">Weekly Routine</a>
  </body>
  <script>
    let taps = 0;
    let timer;

    document.getElementById("secretTitle").addEventListener("click", () => {
      taps++;

      clearTimeout(timer);
      timer = setTimeout(() => {
        taps = 0;
      }, 1500);

      if (taps === 7) {
        window.location.href = "./HiddenSelfImprovement.html";
      }
    });
  </script>
</html>
